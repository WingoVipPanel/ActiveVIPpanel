<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Platform Panel - Premium Activation</title>
    
    <!-- CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0C10; color: #cbd5e1; }
        .glass { background: rgba(21, 22, 25, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .bg-glow { filter: blur(100px); border-radius: 50%; position: absolute; pointer-events: none; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .gradient-text { background: linear-gradient(to right, #3b82f6, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const FAQItem = ({ question, answer }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border-b border-white/5 last:border-0">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full py-5 flex items-center justify-between text-left group">
                        <span className="text-[11px] font-black uppercase tracking-widest text-slate-400 group-hover:text-white transition-colors">{question}</span>
                        <i data-lucide="chevron-down" className={`w-4 h-4 text-slate-600 transition-transform ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && <div className="pb-5 text-[11px] text-slate-500 font-medium leading-relaxed">{answer}</div>}
                </div>
            );
        };

        const ReviewCard = ({ name, text, rating, date }) => (
            <div className="glass rounded-[2rem] p-6 space-y-4 relative overflow-hidden group hover:bg-white/5 transition-all">
                <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center font-black text-white text-xs shadow-lg">
                        {name[0]}
                    </div>
                    <div>
                        <h4 className="text-xs font-black text-white uppercase tracking-widest">{name}</h4>
                        <div className="flex gap-0.5">
                            {[...Array(5)].map((_, i) => (
                                <i key={i} data-lucide="zap" className={`w-2.5 h-2.5 ${i < rating ? 'text-amber-500 fill-amber-500' : 'text-slate-700'}`}></i>
                            ))}
                        </div>
                    </div>
                    <span className="ml-auto text-[9px] font-black text-slate-600 uppercase">{date}</span>
                </div>
                <p className="text-[12px] text-slate-300 font-medium leading-relaxed italic">"{text}"</p>
            </div>
        );

        function App() {
            const [utr, setUtr] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isConfirmed, setIsConfirmed] = useState(false);
            const [recentActivations, setRecentActivations] = useState([
                { utr: "4321****8901", time: "2 mins ago" },
                { utr: "5678****2345", time: "5 mins ago" },
                { utr: "9012****6789", time: "8 mins ago" }
            ]);

            const upiId = "hyysumitx@fam";
            const amount = 400;
            const upiUrl = `upi://pay?pa=${upiId}&pn=Sumit&am=${amount}&cu=INR&tn=Panel%20Activation`;

            useEffect(() => {
                lucide.createIcons();
                const qrContainer = document.getElementById("qrcode");
                if (qrContainer) {
                    qrContainer.innerHTML = "";
                    new QRCode(qrContainer, {
                        text: upiUrl,
                        width: 200,
                        height: 200,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }, [isConfirmed]);

            const handleSubmitUtr = (e) => {
                e.preventDefault();
                if (utr.length < 12) { alert("Please enter a valid 12-digit UTR number."); return; }
                setIsSubmitting(true);
                setTimeout(() => { setIsSubmitting(false); setIsConfirmed(true); }, 2000);
            };

            if (isConfirmed) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
                        <div className="bg-glow w-[40%] h-[40%] top-[-10%] left-[-10%] bg-blue-600/20"></div>
                        <div className="glass max-w-md w-full rounded-[3rem] p-12 text-center space-y-8 shadow-2xl relative z-10">
                            <div className="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto border border-emerald-500/30">
                                <i data-lucide="check-circle-2" className="w-12 h-12 text-emerald-500"></i>
                            </div>
                            <div className="space-y-3">
                                <h1 className="text-3xl font-black uppercase tracking-tight text-white">Payment Confirmed</h1>
                                <p className="text-slate-400 text-sm font-medium">Aapka UTR {utr} verify ho gaya hai. Aapka panel ab active hai!</p>
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full py-5 bg-white text-black rounded-2xl font-black text-[11px] uppercase tracking-[0.25em] shadow-xl">Go to Dashboard</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-hidden">
                    <div className="bg-glow w-full h-[500px] top-0 left-1/2 -translate-x-1/2 bg-blue-600/10"></div>
                    <div className="bg-glow w-[300px] h-[300px] top-[20%] -right-[10%] bg-indigo-600/10"></div>
                    <div className="bg-glow w-[300px] h-[300px] bottom-[10%] -left-[10%] bg-blue-600/10"></div>

                    <header class="sticky top-0 z-50 glass border-b border-white/5 py-6">
                        <div class="max-w-md mx-auto px-6 flex items-center justify-center gap-4">
                            <div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl border border-white/10">
                                <i data-lucide="crown" class="text-white w-7 h-7"></i>
                            </div>
                            <div class="flex flex-col">
                                <h1 class="text-xl font-black text-white uppercase leading-none tracking-tighter">All Platform Panel</h1>
                                <span class="text-[9px] font-black text-blue-400 uppercase tracking-[0.4em] mt-1">Premium Activation</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 py-12 space-y-12 relative z-10">
                        {/* Live Stats Extra */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="glass p-5 rounded-[2rem] text-center border-blue-500/20">
                                <p className="text-[24px] font-black text-white">10.5k+</p>
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Active Users</p>
                            </div>
                            <div className="glass p-5 rounded-[2rem] text-center border-emerald-500/20">
                                <p className="text-[24px] font-black text-white">99.9%</p>
                                <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Win Rate</p>
                            </div>
                        </div>

                        {/* Payment Card */}
                        <section className="glass rounded-[3rem] p-10 space-y-10 shadow-2xl relative group">
                            <div className="text-center space-y-3">
                                <p className="text-[11px] font-black text-blue-400 uppercase tracking-[0.4em]">Activation Fee</p>
                                <h2 className="text-5xl font-black text-white tracking-tighter">₹{amount}</h2>
                            </div>

                            <div className="flex justify-center relative">
                                <div className="absolute inset-0 bg-blue-600/20 blur-[60px] rounded-full scale-75"></div>
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-2xl relative z-10 animate-float" id="qrcode"></div>
                            </div>

                            <div className="text-center space-y-2">
                                <p className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Scan to Pay</p>
                                <div className="bg-white/5 border border-white/10 rounded-xl py-2 px-4 inline-block">
                                    <p className="text-xs font-bold text-white tracking-wider">{upiId}</p>
                                </div>
                            </div>

                            <button onClick={() => window.location.href = upiUrl} className="w-full py-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-[0.35em] flex items-center justify-center gap-4 shadow-2xl active:scale-95 transition-transform">
                                <i data-lucide="smartphone" className="w-6 h-6"></i> Pay via App
                            </button>

                            <form onSubmit={handleSubmitUtr} className="space-y-5">
                                <div className="space-y-3">
                                    <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Enter 12-Digit UTR Number</label>
                                    <input type="text" placeholder="Paste UTR Number Here" value={utr} onChange={(e) => setUtr(e.target.value.replace(/\D/g, '').slice(0, 12))} required className="w-full bg-white/5 border border-white/10 rounded-2xl px-8 py-5 text-sm font-bold text-white placeholder:text-slate-700 focus:outline-none focus:border-blue-500/50 transition-all" />
                                </div>
                                <button type="submit" disabled={isSubmitting || utr.length < 12} className={`w-full py-6 rounded-2xl font-black text-xs uppercase tracking-[0.35em] shadow-xl transition-all ${isSubmitting || utr.length < 12 ? 'bg-slate-800 text-slate-600' : 'bg-white text-black hover:bg-slate-200 active:scale-95'}`}>
                                    {isSubmitting ? "Verifying..." : "Confirm Payment"}
                                </button>
                            </form>
                        </section>

                        {/* 8 Screenshots Section */}
                        <section className="space-y-6">
                            <div className="flex items-center justify-between px-2">
                                <h3 className="text-[11px] font-black text-white uppercase tracking-[0.25em]">Winning Proof Inside</h3>
                                <span className="text-[9px] font-black text-emerald-500 uppercase tracking-widest bg-emerald-500/10 px-3 py-1 rounded-full">100% Accuracy</span>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                {[
                                    "https://i.ibb.co/YTpkjt4z/Screenshot-20260401-132730.jpg",
                                    "https://i.ibb.co/vxqq6vXT/Screenshot-20260401-132712.jpg",
                                    "https://i.ibb.co/qY2ph2FS/IMG-20260401-132618-562.jpg",
                                    "https://i.ibb.co/60dWSHPV/IMG-20260401-132618-595.jpg",
                                    "https://i.ibb.co/wZTB40VF/IMG-20260401-132619-239.jpg",
                                    "https://i.ibb.co/tTMNk5pq/IMG-20260401-132619-030.jpg",
                                    "https://i.ibb.co/MDQLQgXC/IMG-20260401-132618-750.jpg",
                                    "https://i.ibb.co/35n0xys2/IMG-20260401-132619-243.jpg"
                                ].map((url, i) => (
                                    <div key={i} className="aspect-[9/16] glass rounded-[2.5rem] overflow-hidden relative group transition-all hover:translate-y-[-8px] shadow-2xl">
                                        <img src={url} className="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110" loading="lazy" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-transparent to-transparent"></div>
                                        <div className="absolute bottom-5 left-5 right-5 space-y-1">
                                            <div className="flex items-center gap-1.5">
                                                <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                                <span className="text-[8px] font-black text-emerald-400 uppercase tracking-widest">Verified</span>
                                            </div>
                                            <p className="text-[10px] font-black text-white uppercase tracking-widest">Live Hack Proof</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* 7 Hindi Reviews */}
                        <section className="space-y-6">
                            <div className="px-2">
                                <h3 className="text-[11px] font-black text-white uppercase tracking-[0.25em]">User Reviews</h3>
                                <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Aapke Bharose Ka Prateek</span>
                            </div>
                            <div className="space-y-4">
                                <ReviewCard name="Rahul Sharma" text="Bhai sach mein tool kamaal ka hai! 500 deposit kiya tha aur 12k profit ho gaya. Trusted banda hai Sumit bhai." rating={5} date="Today" />
                                <ReviewCard name="Priya Verma" text="Pehle laga tha fake hoga but activation ke baad results dekh kar maza aa gaya. Highly recommended!" rating={5} date="Today" />
                                <ReviewCard name="Amit Kumar" text="Best panel for all platforms. Support team bhi bahut fast hai. Thank you sir!" rating={5} date="Yesterday" />
                                <ReviewCard name="Vikram Singh" text="Maine bahut saare hack try kiye par ye wala best hai. 100% working hai." rating={5} date="Yesterday" />
                                <ReviewCard name="Neha Gupta" text="Withdrawal proof dekh kar trust aaya, aur ab main khud daily 5k kama rahi hoon." rating={5} date="2 Days Ago" />
                                <ReviewCard name="Manish Yadav" text="Sumit bhai ka support system ek number hai. Koi bhi problem ho turant solve karte hain." rating={5} date="2 Days Ago" />
                                <ReviewCard name="Suresh Raina" text="Panel activation process bahut easy hai. QR scan kiya aur 2 min mein active!" rating={5} date="3 Days Ago" />
                            </div>
                        </section>

                        {/* Why Choose Us Extra */}
                        <section className="glass rounded-[3rem] p-8 space-y-6">
                            <h3 className="text-[11px] font-black text-white uppercase tracking-[0.25em] text-center">Why Choose Us?</h3>
                            <div className="space-y-4">
                                {[
                                    { icon: "shield-check", t: "Safe & Secure", d: "Aapka account 100% safe rehta hai." },
                                    { icon: "zap", t: "Instant Activation", d: "Payment ke baad turant access." },
                                    { icon: "lock", t: "Anti-Ban Tech", d: "Latest technology for safety." }
                                ].map((item, i) => (
                                    <div key={i} className="flex items-start gap-4 p-4 bg-white/5 rounded-2xl">
                                        <i data-lucide={item.icon} className="w-5 h-5 text-blue-500 mt-0.5"></i>
                                        <div>
                                            <p className="text-[11px] font-black text-white uppercase tracking-widest">{item.t}</p>
                                            <p className="text-[10px] text-slate-500 font-medium">{item.d}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="space-y-6">
                            <h3 className="text-[11px] font-black text-slate-500 uppercase tracking-[0.25em] ml-4">Common Questions</h3>
                            <div className="glass rounded-[2.5rem] px-8 py-2">
                                <FAQItem question="Activation mein kitna time lagta hai?" answer="UTR verify hote hi activation instant ho jata hai. Kabhi kabhi 5-10 minutes lag sakte hain." />
                                <FAQItem question="Kya mera payment safe hai?" answer="Ji haan, direct UPI transfer sabse safe tarika hai. Hum aapka koi bhi personal data store nahi karte." />
                            </div>
                        </section>

                        <div className="text-center space-y-6 pb-12 opacity-30">
                            <div className="flex items-center justify-center gap-6">
                                <div className="flex items-center gap-2"><i data-lucide="lock" className="w-3 h-3"></i><span className="text-[8px] font-black uppercase tracking-widest">SSL Secured</span></div>
                                <div className="flex items-center gap-2"><i data-lucide="shield-check" className="w-3 h-3"></i><span className="text-[8px] font-black uppercase tracking-widest">Verified</span></div>
                            </div>
                            <p className="text-[10px] font-black uppercase tracking-[0.5em]">© 2026 All Platform Panel</p>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
